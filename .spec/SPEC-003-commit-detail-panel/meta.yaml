learnings:
  - type: gotcha_found
    summary: "On Windows, embedding real NUL bytes in a subprocess argv raises ValueError('embedded null character'); use git's literal %x00 format escape instead."
    context: >
      The CLI-fallback reader initially built the pretty-format with
      _FIELD_SEP.join([...]) where _FIELD_SEP == "\x00", putting literal NULs in
      the git argument. CreateProcess rejects NUL in argv, so every CLI-backend
      test failed. Fix: use "%x00".join([...]) — git expands %x00 to NUL in its
      OUTPUT while the argument text stays NUL-free; still split output on \x00.
      NOTE: the pre-existing _read_git_log (SPEC-001) has the same latent bug but
      never triggers because pygit2 is always the primary path in tests.
    tags: [git-reader, windows, subprocess, cli-fallback]
    date: 2026-07-09
  - type: gotcha_found
    summary: "`git diff-tree <merge>` emits no file list for merge commits; diff the explicit first-parent tree (`git diff-tree <parent0> <sha>`) to match pygit2's repo.diff(parents[0], commit)."
    context: >
      --first-parent on a single-commit diff-tree does not produce a first-parent
      diff for merges. Passing the first parent SHA and the commit SHA as two
      explicit trees yields the first-parent name-status (AC-5); --root handles
      the parentless initial commit (AC-4).
    tags: [git-reader, merge, first-parent, cli-fallback]
    date: 2026-07-09
  - type: gotcha_found
    summary: "A native <dialog> styled as a right drawer needs left:auto (the UA stylesheet sets left:0), and SVG text over a row-hit rect needs pointer-events:none so row clicks register."
    context: >
      With position:fixed; right:0; width:420px the panel still anchored left
      until left:auto cancelled the UA dialog's left:0. Separately, the graph's
      <text> elements sit above the transparent row-hit rect (which carries
      data-sha), so clicking a commit's subject/sha text was a dead zone until
      pointer-events:none let the click fall through (AC-1). An explicit Escape
      keydown handler was also added since synthetic key events don't trigger the
      dialog's UA Escape-close.
    tags: [frontend, dialog, svg, accessibility]
    date: 2026-07-09
  - type: scope_deviation
    summary: "CLI fallback uses a robust two-command approach (git show -s for metadata + git diff-tree for files) instead of the spec's recommended single `git show -s --name-status -z` invocation."
    context: >
      The recommended single invocation is unreliable: -s (--no-patch)
      suppresses --name-status output, and plain `git show` on a merge defaults
      to a combined (--cc) diff rather than the first-parent diff AC-5 requires.
      The two-command approach produces the identical CommitDetail and satisfies
      all ACs (verified by dual-backend tests). The ACs constrain output, not the
      exact git command, so this is an implementation-detail deviation.
    tags: [git-reader, cli-fallback, scope]
    date: 2026-07-09
